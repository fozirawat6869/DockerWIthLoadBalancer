

version: "3.8"

services:

  backend1:
    build: ./backend
    environment:
      - SERVER_ID=server1
  
  backend2:
    build: ./backend
    environment:
      - SERVER_ID=server2

  backend3:
    build: ./backend
    environment:
      - SERVER_ID=server3

  frontend:
    build: ./frontend
    ports:
      - "5174:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

    
  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
     - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend1
      - backend2
      - backend3
    
     